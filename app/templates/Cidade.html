<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidades</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <a class="navbar-brand" href="/">Sistema Acadêmico</a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/cidade/">Cidade</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/ocupacao/">Ocupação</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/pessoa/">Pessoa</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/instituicao/">Instituição</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/curso/">Curso</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/disciplina/">Disciplina</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/matricula/">Matrícula</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/avaliacao/">Avaliação</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/avaliacao-tipo/">Tipo Avaliação</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/">Administração</a>
                </li>

            </ul>

        </div>
    </nav>

    <div class="container mt-5">

        <h2 class="mb-4">Tabela de Cidades</h2>

        <table class="table table-striped">

            <thead>
                <tr>
                    <th>Nome</th>
                    <th>UF</th>
                </tr>
            </thead>

            <tbody>

                {% for cidade in cidades %}
                <tr>
                    <td>{{ cidade.nome }}</td>
                    <td>{{ cidade.uf }}</td>
                </tr>
                {% endfor %}

            </tbody>

        </table>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>

    <!-- Popper -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.1/dist/umd/popper.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
